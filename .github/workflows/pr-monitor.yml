name: PR Monitor

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to monitor'
        required: false
        default: '11'
  schedule:
    - cron: '0 * * * *' # hourly

permissions: read-all

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gh CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate gh CLI
        env:
          MONITOR_GITHUB_TOKEN: ${{ secrets.MONITOR_GITHUB_TOKEN }}
        run: echo "$MONITOR_GITHUB_TOKEN" | gh auth login --with-token

      - name: Run PR monitor
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/monitor_pr_runs.ps1 -PrNumber ${{ github.event.inputs.pr_number || '11' }}

      - name: Ensure pr-logs directory exists
        run: |
          # Create a placeholder so artifact upload always has something to upload
          if [ ! -d pr-logs ] || [ -z "$(ls -A pr-logs 2>/dev/null)" ]; then
            mkdir -p pr-logs
            echo "No pr-logs produced for run $GITHUB_RUN_ID on $(date -u)" > pr-logs/placeholder.txt
            echo "Created placeholder in pr-logs/"
            ls -lah pr-logs || true
          else
            echo "pr-logs contains files; no placeholder needed"
          fi

      - name: Package pr-logs (if any)
        run: |
          if [ -d pr-logs ]; then
            # Show files and sizes for telemetry before packaging
            echo "Listing pr-logs contents with sizes:"
            find pr-logs -type f -print0 | xargs -0 ls -lah --full-time || true
            echo "Total size of pr-logs directory:"
            du -sh pr-logs || true
            ts=$(date -u +"%Y%m%d-%H%M%SZ")
            out="pr-logs-${ts}.tar.gz"
            tar -czf "$out" pr-logs
            echo "Packaged $out"
            ls -lah "$out"
            tar -tzf "$out" | head -n 200 || true
          else
            echo "No pr-logs directory present"
          fi

      - name: Upload pr-logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-logs-${{ github.run_id }}
          path: |
            pr-logs-*.tar.gz
            pr-logs
